name: Build meteograms

on:
  schedule:
    - cron: '30 8 * * *'    # after 00z ENS dissemination (~07–08 UTC)
    - cron: '30 20 * * *'   # after 12z ENS dissemination (~19–20 UTC)
  workflow_dispatch: {}      # allow manual runs

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install eccodes (GRIB C library)
        run: sudo apt-get update && sudo apt-get install -y libeccodes0 libeccodes-tools
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Generate meteogram data
        env:
          ECMWF_SOURCE: azure   # Azure mirror — far faster bulk pulls than data.ecmwf.int
        run: python generate.py
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r data _site/data
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
